<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAchei o Risco</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 15px; margin: 0; }
        .box-video { position: relative; width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid #007bff; background: #000; margin-bottom: 10px; min-height: 300px; }
        video, canvas { width: 100%; display: block; }
        .btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #btn-foto { background: #007bff; color: white; }
        #btn-whats { background: #25D366; color: white; display: none; }
        input { width: 90%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #222; color: white; text-align: center; }
        #status { color: #ffc107; margin: 10px 0; font-weight: bold; }
        .info-uso { font-size: 13px; color: #aaa; background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        #setup-key { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px dashed #007bff; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="container">
    <h2 style="color: #007bff;">🛡️ IAchei o Risco</h2>
   
    <div id="setup-key">
        <input type="password" id="input-key" placeholder="Cole sua Chave API do Gemini">
        <button class="btn" onclick="salvarChave()" style="background: #28a745; color: white; padding: 10px;">ATIVAR SISTEMA</button>
    </div>

    <div class="info-uso">
        📅 11/03/2026 | 📊 Consultas: <b><span id="uso-atual">0</span></b>
    </div>

    <div class="box-video">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div id="status">Câmera pronta para auditoria</div>
    <button id="btn-foto" class="btn" onclick="analisar()">ANALISAR RISCO AGORA</button>

    <input type="tel" id="telefone" placeholder="WhatsApp (Ex: 551299...)">
    <button id="btn-whats" class="btn" onclick="enviarWhatsApp()">ENVIAR LAUDO VIA WHATSAPP</button>
   
    <button onclick="resetar()" style="background:none; color:#555; border:none; text-decoration:underline; font-size:11px; cursor:pointer; margin-top:15px;">🔄 Configurar Nova Chave</button>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    let contagem = localStorage.getItem('contagem') || 0;
    document.getElementById('uso-atual').innerText = contagem;
   
    if(localStorage.getItem('chave_linkup')) {
        document.getElementById('setup-key').style.display = 'none';
    }

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    let laudoFinal = "";

    // Iniciar Câmera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(s => video.srcObject = s)
        .catch(() => status.innerText = "Erro: Permita o acesso à câmera!");

    window.salvarChave = () => {
        const k = document.getElementById('input-key').value.trim();
        if(k) {
            localStorage.setItem('chave_linkup', k);
            location.reload();
        } else {
            alert("Por favor, insira uma chave válida.");
        }
    };

    window.analisar = async () => {
        const key = localStorage.getItem('chave_linkup');
        if(!key) { alert("Configure a Chave API primeiro!"); return; }

        status.innerText = "🔍 PROCESSANDO IMAGEM...";
       
        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            // Capturar frame do vídeo
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
           
            // Converter para Base64 (JPEG com qualidade média para velocidade)
            const imgData = canvas.toDataURL("image/jpeg", 0.6).split(',')[1];

            status.innerText = "🤖 IA ANALISANDO NORMAS...";

            const prompt = "Aja como um engenheiro de segurança do trabalho e perito industrial. Analise esta imagem e forneça um laudo curto com: 1. LOCAL, 2. RISCO IDENTIFICADO, 3. NORMA REGULAMENTADORA (Ex: NR-10, NR-12, NR-35). Seja direto.";
           
            const result = await model.generateContent([
                prompt,
                { inlineData: { data: imgData, mimeType: "image/jpeg" } }
            ]);
           
            // CORREÇÃO AQUI: await e parênteses ()
            laudoFinal = await result.response.text();

            // Efeito visual de análise concluída
            video.style.display = "none";
            canvas.style.display = "block";
            ctx.strokeStyle = "red"; ctx.lineWidth = 10; ctx.beginPath();
            ctx.moveTo(10, 10); ctx.lineTo(100, 100);
            ctx.moveTo(100, 10); ctx.lineTo(10, 100); // Marcação simples no canto
            ctx.stroke();

            contagem++;
            localStorage.setItem('contagem', contagem);
            document.getElementById('uso-atual').innerText = contagem;

            status.innerText = "✅ ANÁLISE CONCLUÍDA!";
            document.getElementById('btn-whats').style.display = "block";
           
        } catch (e) {
            status.innerText = "❌ ERRO NA API";
            console.error("Erro detalhado:", e);
            alert("Verifique se sua chave API está correta ou se o limite foi atingido.");
        }
    };

    window.resetar = () => {
        if(confirm("Deseja trocar a chave da API?")) {
            localStorage.removeItem('chave_linkup');
            location.reload();
        }
    };

    window.enviarWhatsApp = () => {
        let n = document.getElementById('telefone').value.replace(/\D/g, '');
        if(!n) { alert("Digite o número do WhatsApp"); return; }
       
        const mensagem = `*AUDITORIA LINK UP - RELATÓRIO*\n\n${laudoFinal}`;
        window.open(`https://wa.me/${n}?text=${encodeURIComponent(mensagem)}`, '_blank');
    };
</script>
</body>
</html>
