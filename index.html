<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAchei o Risco</title>
    <style>
        :root { --blue: #007bff; --green: #25D366; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; padding: 15px; margin: 0; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 90%; padding: 12px; border-radius: 8px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #444; }
        .box-camera { width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid var(--blue); background: #000; height: 350px; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-analisar { background: var(--blue); color: white; }
        .btn-whats { background: var(--green); color: white; display: none; }
        #status { color: #ffc107; font-weight: bold; margin: 15px 0; }
        #relatorio { background: white; color: #333; padding: 20px; border-radius: 12px; text-align: left; display: none; margin-top: 20px; border-left: 8px solid var(--blue); }
    </style>
</head>
<body>

    <h2 style="color:var(--blue);">🛡️ IAchei o Risco</h2>
   
    <div class="card">
        <label style="font-size: 12px; color: #888;">CHAVE API GEMINI:</label>
        <input type="password" id="api-key" placeholder="Cole sua Chave API aqui">
       
        <label style="font-size: 12px; color: #888;">NÚMERO DO WHATSAPP (COM DDD):</label>
        <input type="tel" id="zap-num" placeholder="Ex: 129XXXXXXXX">
    </div>

    <div id="status">Aguardando Câmera...</div>

    <div class="box-camera">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <button class="btn btn-analisar" onclick="executarAuditoria()">AUDITAR RISCO E GERAR LAUDO</button>

    <div id="relatorio">
        <h3 style="margin:0; color:var(--blue);">📋 LAUDO TÉCNICO DE SEGURANÇA</h3>
        <p id="conteudo-laudo" style="white-space: pre-wrap;"></p>
    </div>

    <button id="btn-whats" class="btn btn-whats" onclick="enviarRelatorio()">ENVIAR VIA WHATSAPP</button>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const relatorio = document.getElementById('relatorio');
    const conteudo = document.getElementById('conteudo-laudo');
    const inputKey = document.getElementById('api-key');
    const inputZap = document.getElementById('zap-num');
    let laudoGlobal = "";

    // Recupera dados salvos
    if(localStorage.getItem('linkup_key')) inputKey.value = localStorage.getItem('linkup_key');
    if(localStorage.getItem('linkup_zap')) inputZap.value = localStorage.getItem('linkup_zap');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; status.innerText = "✅ Sistema Pronto"; })
        .catch(() => { status.innerText = "❌ Erro: Ative a câmera."; });

    async function executarAuditoria() {
        const key = inputKey.value.trim();
        if(!key) { alert("Insira a chave API!"); return; }
       
        localStorage.setItem('linkup_key', key);
        localStorage.setItem('linkup_zap', inputZap.value);

        status.innerText = "🔍 ANALISANDO IMAGEM...";
        relatorio.style.display = "none";
        document.getElementById('btn-whats').style.display = "none";

        try {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const imgBase64 = canvas.toDataURL("image/jpeg", 0.3).split(',')[1];

            // Endereço oficial corrigido
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Aja como Auditor de Segurança. Identifique na imagem: 1. LOCAL, 2. RISCO, 3. NR VIOLADA (Qualquer NR aplicável), 4. MEDIDA CORRETIVA TÉCNICA (O que fazer para resolver). Seja muito direto." },
                            { inlineData: { mimeType: "image/jpeg", data: imgBase64 } }
                        ]
                    }]
                })
            });

            const data = await response.json();
           
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                laudoGlobal = data.candidates[0].content.parts[0].text;
                conteudo.innerText = laudoGlobal;
                status.innerText = "✅ AUDITORIA CONCLUÍDA";
                relatorio.style.display = "block";
                document.getElementById('btn-whats').style.display = "block";
            } else {
                alert("Erro: Verifique sua chave API ou o limite do Google.");
            }

        } catch (e) {
            status.innerText = "❌ ERRO DE CONEXÃO (USE O GITHUB)";
            console.error(e);
        }
    }

    function enviarRelatorio() {
        const tel = inputZap.value.replace(/\D/g, '');
        if(!tel) { alert("Informe o número do WhatsApp!"); return; }
       
        const mensagem = `*🛡️ LINK UP AUDITOR - RELATÓRIO TÉCNICO*\n\n${laudoGlobal}`;
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(mensagem)}`, '_blank');
    }
</script>
</body>
</html>
